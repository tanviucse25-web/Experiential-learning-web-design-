<head>
  <title>Workshop Registration</title>
</head>
<body>

<h1>Workshop Registration</h1>
<p>Complete your registration and choose a payment method.</p>

<h2>Step 3: Payment Details</h2>

<form>

  <label>Full Name</label><br>
  <input type="text"><br><br>

  <label>Email</label><br>
  <input type="email"><br><br>

  <h3>Choose Payment Method</h3>

  <input type="radio" name="payment"> Credit Card<br>
  <input type="radio" name="payment"> Net Banking<br><br>

  <h4>Credit Card Details</h4>
  <label>Card Number</label><br>
  <input type="text"><br>

  <label>Expiry Date</label><br>
  <input type="text"><br>

  <label>CVV</label><br>
  <input type="password"><br>

  <label>Name on Card</label><br>
  <input type="text"><br><br>

  <h4>Net Banking</h4>
  <label>Select Bank</label><br>
  <select>
    <option>SBI</option>
    <option>HDFC</option>
    <option>ICICI</option>
  </select><br>

  <label>User ID</label><br>
  <input type="text"><br>

  <label>MPIN</label><br>
  <input type="password"><br><br>

  <button type="submit">Confirm Registration</button>

</form>

</body>
</html>
